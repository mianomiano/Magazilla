<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="csrf-token" content="{{csrf_token()}}">
    <title>{{settings.app_name}}</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@400;700&family=Grandstander:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{url_for('static',filename='css/style.css')}}">
    <style>
        :root {
            --p: {{settings.primary_color}};
            --s: {{settings.secondary_color}};
            --a: {{settings.accent_color}};
            --pl: {{settings.primary_color}}dd;
            --t: #e8eaed;
            --td: #9aa0a6;
            --tm: #5f6368;
            --sd: rgba(0,0,0,0.5);
            --sl: rgba(30,40,55,0.3);
        }
        
        /* ========== CORE COLOR OVERRIDES ========== */
        
        /* Background */
        body, .app-container {
            background: var(--p) !important;
        }
        
        /* Cards & Containers */
        .product-card,
        .category-card,
        .settings-card,
        .stat-card {
            background: color-mix(in srgb, var(--p) 85%, white 15%) !important;
            border: 1px solid color-mix(in srgb, var(--p) 70%, white 30%) !important;
        }
        
        /* For older browsers without color-mix */
        @supports not (color: color-mix(in srgb, red, blue)) {
            .product-card,
            .category-card,
            .settings-card,
            .stat-card {
                background: var(--p) !important;
                border: 1px solid rgba(255,255,255,0.1) !important;
            }
        }
        
        /* Primary Buttons - Use Secondary Color */
        .neu-btn-primary,
        .btn-primary,
        .download-btn,
        .buy-btn,
        .save-btn,
        button[type="submit"] {
            background: var(--s) !important;
            color: var(--p) !important;
            border: none !important;
        }
        
        .neu-btn-primary:hover,
        .btn-primary:hover,
        .download-btn:hover,
        .buy-btn:hover {
            background: color-mix(in srgb, var(--s) 85%, white 15%) !important;
            box-shadow: 0 4px 20px color-mix(in srgb, var(--s) 50%, transparent) !important;
        }
        
        /* Secondary/Ghost Buttons */
        .neu-btn,
        .btn-secondary,
        .btn-ghost {
            background: color-mix(in srgb, var(--p) 80%, white 20%) !important;
            color: var(--t) !important;
            border: 1px solid color-mix(in srgb, var(--p) 60%, white 40%) !important;
        }
        
        /* Filter Buttons */
        .filter-btn,
        .category-btn {
            background: color-mix(in srgb, var(--p) 85%, white 15%) !important;
            color: var(--td) !important;
            border: 1px solid color-mix(in srgb, var(--p) 70%, white 30%) !important;
        }
        
        .filter-btn.active,
        .filter-btn:hover,
        .category-btn.active,
        .category-btn:hover {
            background: var(--s) !important;
            color: var(--p) !important;
            border-color: var(--s) !important;
        }
        
        /* Accent Color Usage */
        .product-badge.premium,
        .badge-premium,
        .accent-badge {
            background: var(--a) !important;
            color: white !important;
        }
        
        /* Price & Highlights use Accent */
        .product-price,
        .price,
        .stars-amount,
        .stat-value,
        .highlight {
            color: var(--s) !important;
        }
        
        /* Links use Accent */
        a.accent-link,
        .link-accent {
            color: var(--a) !important;
        }
        
        /* Header/Logo Area */
        .logo-area,
        .header-area {
            background: linear-gradient(180deg, color-mix(in srgb, var(--p) 90%, var(--s) 10%), var(--p)) !important;
            border-bottom: 1px solid color-mix(in srgb, var(--s) 30%, transparent) !important;
        }
        
        /* Product Thumbnail Placeholder */
        .product-thumbnail {
            background: color-mix(in srgb, var(--p) 70%, black 30%) !important;
        }
        
        /* Input Fields */
        input, textarea, select {
            background: color-mix(in srgb, var(--p) 80%, black 20%) !important;
            border: 1px solid color-mix(in srgb, var(--p) 60%, white 40%) !important;
            color: var(--t) !important;
        }
        
        input:focus, textarea:focus, select:focus {
            border-color: var(--s) !important;
            outline: none !important;
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--s) 30%, transparent) !important;
        }
        
        /* Modal & Overlay */
        .modal-content,
        .popup-content,
        .dropdown-menu {
            background: color-mix(in srgb, var(--p) 95%, white 5%) !important;
            border: 1px solid color-mix(in srgb, var(--p) 70%, white 30%) !important;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar-track {
            background: var(--p);
        }
        
        ::-webkit-scrollbar-thumb {
            background: color-mix(in srgb, var(--p) 60%, white 40%);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--s);
        }
        
        /* Free Badge - uses Secondary */
        .product-badge.free,
        .badge-free {
            background: color-mix(in srgb, var(--s) 20%, transparent) !important;
            color: var(--s) !important;
        }
        
        /* Paid Badge - uses Accent */
        .product-badge.paid,
        .badge-paid {
            background: color-mix(in srgb, var(--a) 20%, transparent) !important;
            color: var(--a) !important;
        }
        
        /* Navigation */
        .nav-item.active,
        .tab.active {
            color: var(--s) !important;
            border-color: var(--s) !important;
        }
        
        /* Progress bars */
        .progress-fill {
            background: linear-gradient(90deg, var(--s), var(--a)) !important;
        }
        
        /* Dividers */
        hr, .divider {
            border-color: color-mix(in srgb, var(--p) 70%, white 30%) !important;
        }
        
        /* ========== FONT FAMILY ========== */
        {% if settings.font_family == 'balsamiq' %}
        body, button, input, textarea, select { font-family: 'Balsamiq Sans', cursive !important; }
        {% elif settings.font_family == 'grandstander' %}
        body, button, input, textarea, select { font-family: 'Grandstander', cursive !important; }
        {% elif settings.font_family == 'montserrat' %}
        body, button, input, textarea, select { font-family: 'Montserrat', sans-serif !important; }
        {% elif settings.font_family == 'russo' %}
        body, button, input, textarea, select { font-family: 'Russo One', sans-serif !important; }
        {% else %}
        body, button, input, textarea, select { font-family: 'Inter', -apple-system, sans-serif !important; }
        {% endif %}
        
        /* ========== BUTTON ROUNDNESS ========== */
        {% if settings.button_roundness == 'sharp' %}
        .neu-btn, .filter-btn, .product-card, .product-badge, 
        .btn-primary, .btn-secondary, input, textarea, select,
        .modal-content, .dropdown-menu { 
            border-radius: 4px !important; 
        }
        {% elif settings.button_roundness == 'pill' %}
        .neu-btn, .filter-btn, .btn-primary, .btn-secondary { 
            border-radius: 50px !important; 
        }
        .product-card, .modal-content { 
            border-radius: 20px !important; 
        }
        .product-badge { 
            border-radius: 12px !important; 
        }
        input, textarea, select {
            border-radius: 12px !important;
        }
        {% else %}
        .neu-btn, .filter-btn, .btn-primary, .btn-secondary { 
            border-radius: 12px !important; 
        }
        .product-card { 
            border-radius: 16px !important; 
        }
        input, textarea, select {
            border-radius: 8px !important;
        }
        {% endif %}
        
        /* ========== BUTTON STYLE ========== */
        {% if settings.button_style == 'flat' %}
        .neu-btn, .btn-secondary {
            box-shadow: none !important;
            border: 2px solid var(--s) !important;
            background: transparent !important;
            color: var(--s) !important;
        }
        .neu-btn-primary, .btn-primary, .download-btn, .buy-btn {
            box-shadow: none !important;
            background: var(--s) !important;
            border: 2px solid var(--s) !important;
        }
        .neu-btn:active, .btn-secondary:active { 
            transform: scale(0.97); 
        }
        
        {% elif settings.button_style == 'bubble' %}
        .neu-btn, .btn-secondary {
            box-shadow: 0 4px 0 rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1) !important;
            border: 2px solid rgba(255,255,255,0.1) !important;
        }
        .neu-btn:active, .btn-secondary:active {
            box-shadow: 0 1px 0 rgba(0,0,0,0.3) !important;
            transform: translateY(3px);
        }
        .neu-btn-primary, .btn-primary, .download-btn, .buy-btn {
            box-shadow: 0 4px 0 color-mix(in srgb, var(--s) 50%, black 50%), 
                        inset 0 1px 0 rgba(255,255,255,0.2) !important;
        }
        .neu-btn-primary:active, .btn-primary:active {
            box-shadow: 0 1px 0 color-mix(in srgb, var(--s) 50%, black 50%) !important;
            transform: translateY(3px);
        }
        
        {% elif settings.button_style == 'glow' %}
        .neu-btn, .btn-secondary {
            box-shadow: 0 0 15px rgba(255,255,255,0.1) !important;
        }
        .neu-btn:hover, .btn-secondary:hover {
            box-shadow: 0 0 25px color-mix(in srgb, var(--s) 50%, transparent) !important;
        }
        .neu-btn-primary, .btn-primary, .download-btn, .buy-btn {
            box-shadow: 0 0 20px color-mix(in srgb, var(--s) 50%, transparent) !important;
        }
        .neu-btn-primary:hover, .btn-primary:hover {
            box-shadow: 0 0 35px color-mix(in srgb, var(--s) 70%, transparent) !important;
        }
        
        {% else %}
        /* Soft (Neumorphic) - Default */
        .neu-btn, .btn-secondary {
            box-shadow: 3px 3px 6px rgba(0,0,0,0.4), 
                        -2px -2px 5px color-mix(in srgb, var(--p) 80%, white 20%) !important;
        }
        .neu-btn:active, .btn-secondary:active {
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.3),
                        inset -1px -1px 3px color-mix(in srgb, var(--p) 80%, white 20%) !important;
        }
        .neu-btn-primary, .btn-primary, .download-btn, .buy-btn {
            box-shadow: 3px 3px 6px rgba(0,0,0,0.3), 
                        -2px -2px 5px color-mix(in srgb, var(--s) 80%, white 20%),
                        0 0 20px color-mix(in srgb, var(--s) 30%, transparent) !important;
        }
        {% endif %}
        
        /* ========== CARD SIZE ========== */
        {% if settings.card_size == 'small' %}
        .products-grid {
            grid-template-columns: repeat(3, 1fr) !important;
            gap: 8px !important;
        }
        .product-name {
            font-size: 12px !important;
        }
        {% elif settings.card_size == 'large' %}
        .products-grid {
            grid-template-columns: 1fr !important;
            max-width: 400px;
            margin: 0 auto;
        }
        {% else %}
        .products-grid {
            grid-template-columns: repeat(2, 1fr) !important;
        }
        {% endif %}
        
        /* ========== CARD SHAPE ========== */
        {% if settings.card_shape == 'rectangle' %}
        .product-thumbnail { 
            aspect-ratio: 3/4 !important; 
        }
        {% endif %}
        
        /* ========== CARD INFO ========== */
        {% if settings.card_info == 'image' %}
        .product-info { 
            display: none !important; 
        }
        .product-card {
            overflow: hidden;
        }
        {% elif settings.card_info == 'minimal' %}
        .product-category, .product-price, .product-description { 
            display: none !important; 
        }
        {% endif %}
        
        /* ========== HEADER SIZE ========== */
        {% if settings.header_size == 'compact' %}
        .logo-area { 
            min-height: 40px !important; 
            padding: 8px 16px !important; 
        }
        .logo-area img, .logo-area video { 
            max-height: 50px !important; 
        }
        {% elif settings.header_size == 'tall' %}
        .logo-area { 
            min-height: 120px !important; 
            padding: 24px 16px !important; 
        }
        .logo-area img, .logo-area video { 
            max-height: 180px !important; 
        }
        {% endif %}
        
        /* ========== SHOW/HIDE FILTERS ========== */
        {% if not settings.show_filters %}
        .category-filter, .filters-container { 
            display: none !important; 
        }
        {% endif %}
        
        /* ========== ADMIN FAB STYLES ========== */
        #admin-fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 9999;
            display: none;
        }
        
        #admin-fab-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        #admin-fab-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        #admin-fab-btn:active {
            transform: scale(0.95);
        }
        
        #admin-menu {
            display: none;
            position: absolute;
            bottom: 65px;
            right: 0;
            background: color-mix(in srgb, var(--p) 95%, white 5%);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            overflow: hidden;
            min-width: 200px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        #admin-menu a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            color: var(--t);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        
        #admin-menu a:last-child {
            border-bottom: none;
        }
        
        #admin-menu a:hover {
            background: rgba(255,255,255,0.08);
        }
        
        #admin-menu a span.icon {
            font-size: 18px;
        }
        
        #admin-menu-header {
            padding: 12px 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* ========== FALLBACK FOR OLDER BROWSERS ========== */
        @supports not (color: color-mix(in srgb, red, blue)) {
            .neu-btn, .btn-secondary {
                background: rgba(255,255,255,0.05) !important;
            }
            .filter-btn, .category-btn {
                background: rgba(255,255,255,0.05) !important;
            }
            .product-card {
                background: rgba(255,255,255,0.03) !important;
            }
            input, textarea, select {
                background: rgba(0,0,0,0.2) !important;
                border-color: rgba(255,255,255,0.1) !important;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        {%block content%}{%endblock%}
    </div>
    
    <!-- Admin Floating Action Button -->
    <div id="admin-fab">
        <button id="admin-fab-btn" onclick="toggleAdminMenu()">
            ⚙️
        </button>
        
        <div id="admin-menu">
            <div id="admin-menu-header">🔐 Admin Panel</div>
            <a href="/admin">
                <span class="icon">📊</span> Dashboard
            </a>
            <a href="/admin/purchases">
                <span class="icon">💰</span> Purchases
            </a>
            <a href="/admin/product/new">
                <span class="icon">➕</span> Add Product
            </a>
            <a href="/admin/appearance">
                <span class="icon">🎨</span> Appearance
            </a>
            <a href="/admin/settings">
                <span class="icon">⚙️</span> Settings
            </a>
        </div>
    </div>
    
    <script src="{{url_for('static',filename='js/app.js')}}"></script>
    
    <script>
    // Admin Panel Functionality
    (function() {
        let menuOpen = false;
        
        window.toggleAdminMenu = function() {
            const menu = document.getElementById('admin-menu');
            menuOpen = !menuOpen;
            menu.style.display = menuOpen ? 'block' : 'none';
        };
        
        document.addEventListener('click', function(e) {
            const fab = document.getElementById('admin-fab');
            if (fab && !fab.contains(e.target) && menuOpen) {
                document.getElementById('admin-menu').style.display = 'none';
                menuOpen = false;
            }
        });
        
        async function checkAdminStatus() {
            try {
                const tg = window.Telegram?.WebApp;
                if (!tg || !tg.initData) return;
                
                const response = await fetch('/api/check-admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Telegram-Init-Data': tg.initData
                    },
                    body: JSON.stringify({})
                });
                
                const data = await response.json();
                
                if (data.is_admin) {
                    document.getElementById('admin-fab').style.display = 'block';
                }
            } catch (e) {
                console.error('Admin check failed:', e);
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', checkAdminStatus);
        } else {
            checkAdminStatus();
        }
        
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
        }
    })();
    </script>
</body>
</html>

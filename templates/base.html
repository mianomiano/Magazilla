<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="csrf-token" content="{{csrf_token()}}">
    <title>{{settings.app_name}}</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@400;700&family=Grandstander:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{url_for('static',filename='css/style.css')}}">
    <style>
        :root {
            --p: {{settings.primary_color}};
            --s: {{settings.secondary_color}};
            --a: {{settings.accent_color}};
            --pl: #0f1419;
            --t: #e8eaed;
            --td: #9aa0a6;
            --tm: #5f6368;
            --sd: rgba(0,0,0,0.5);
            --sl: rgba(30,40,55,0.3);
        }
        
        /* Font Family */
        {% if settings.font_family == 'balsamiq' %}
        body { font-family: 'Balsamiq Sans', cursive; }
        {% elif settings.font_family == 'grandstander' %}
        body { font-family: 'Grandstander', cursive; }
        {% elif settings.font_family == 'montserrat' %}
        body { font-family: 'Montserrat', sans-serif; }
        {% elif settings.font_family == 'russo' %}
        body { font-family: 'Russo One', sans-serif; }
        {% else %}
        body { font-family: 'Inter', -apple-system, sans-serif; }
        {% endif %}
        
        /* Button Roundness */
        {% if settings.button_roundness == 'sharp' %}
        .neu-btn, .filter-btn, .product-card, .product-badge { border-radius: 4px !important; }
        {% elif settings.button_roundness == 'pill' %}
        .neu-btn, .filter-btn { border-radius: 50px !important; }
        .product-card { border-radius: 20px !important; }
        .product-badge { border-radius: 12px !important; }
        {% endif %}
        
        /* Button Style */
        {% if settings.button_style == 'flat' %}
        .neu-btn {
            box-shadow: none !important;
            border: 2px solid var(--s) !important;
            background: transparent !important;
        }
        .neu-btn-primary {
            background: var(--s) !important;
            border-color: var(--s) !important;
        }
        .neu-btn:active { transform: scale(0.97); }
        {% elif settings.button_style == 'bubble' %}
        .neu-btn {
            box-shadow: 0 4px 0 rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1) !important;
            border: 2px solid rgba(255,255,255,0.1) !important;
        }
        .neu-btn:active {
            box-shadow: 0 1px 0 rgba(0,0,0,0.3) !important;
            transform: translateY(3px);
        }
        .neu-btn-primary {
            box-shadow: 0 4px 0 #6a9410, inset 0 1px 0 rgba(255,255,255,0.2) !important;
        }
        {% elif settings.button_style == 'glow' %}
        .neu-btn {
            box-shadow: 0 0 15px rgba(255,255,255,0.1) !important;
        }
        .neu-btn:hover {
            box-shadow: 0 0 25px var(--s) !important;
        }
        .neu-btn-primary {
            box-shadow: 0 0 20px var(--s) !important;
        }
        {% endif %}
        
        /* Card Size */
        {% if settings.card_size == 'small' %}
        .products-grid {
            grid-template-columns: repeat(3, 1fr) !important;
            gap: 8px !important;
        }
        {% elif settings.card_size == 'large' %}
        .products-grid {
            grid-template-columns: 1fr !important;
            max-width: 400px;
            margin: 0 auto;
        }
        {% else %}
        .products-grid {
            grid-template-columns: repeat(2, 1fr) !important;
        }
        {% endif %}
        
        /* Card Shape */
        {% if settings.card_shape == 'rectangle' %}
        .product-thumbnail { aspect-ratio: 3/4 !important; }
        {% endif %}
        
        /* Card Info */
        {% if settings.card_info == 'image' %}
        .product-info { display: none !important; }
        {% elif settings.card_info == 'minimal' %}
        .product-category, .product-price { display: none !important; }
        {% endif %}
        
        /* Header Size */
        {% if settings.header_size == 'compact' %}
        .logo-area { min-height: 40px !important; padding: 5px 10px !important; }
        .logo-area img, .logo-area video { max-height: 50px !important; }
        {% elif settings.header_size == 'tall' %}
        .logo-area { min-height: 120px !important; padding: 20px 10px !important; }
        .logo-area img, .logo-area video { max-height: 180px !important; }
        {% endif %}
        
        /* Show/Hide Filters */
        {% if not settings.show_filters %}
        .category-filter { display: none !important; }
        {% endif %}
        
        /* Admin Floating Button Styles */
        #admin-fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 9999;
            display: none;
        }
        
        #admin-fab-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        #admin-fab-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        #admin-fab-btn:active {
            transform: scale(0.95);
        }
        
        #admin-menu {
            display: none;
            position: absolute;
            bottom: 65px;
            right: 0;
            background: #1e2733;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            overflow: hidden;
            min-width: 200px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        #admin-menu a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            color: #e8eaed;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        
        #admin-menu a:last-child {
            border-bottom: none;
        }
        
        #admin-menu a:hover {
            background: rgba(255,255,255,0.08);
        }
        
        #admin-menu a span.icon {
            font-size: 18px;
        }
        
        #admin-menu-header {
            padding: 12px 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        {%block content%}{%endblock%}
    </div>
    
    <!-- Admin Floating Action Button -->
    <div id="admin-fab">
        <button id="admin-fab-btn" onclick="toggleAdminMenu()">
            ⚙️
        </button>
        
        <div id="admin-menu">
            <div id="admin-menu-header">🔐 Admin Panel</div>
            <a href="/admin">
                <span class="icon">📊</span> Dashboard
            </a>
            <a href="/admin/purchases">
                <span class="icon">💰</span> Purchases
            </a>
            <a href="/admin/product/new">
                <span class="icon">➕</span> Add Product
            </a>
            <a href="/admin/appearance">
                <span class="icon">🎨</span> Appearance
            </a>
            <a href="/admin/settings">
                <span class="icon">⚙️</span> Settings
            </a>
        </div>
    </div>
    
    <script src="{{url_for('static',filename='js/app.js')}}"></script>
    
    <script>
    // Admin Panel Functionality
    (function() {
        let menuOpen = false;
        
        window.toggleAdminMenu = function() {
            const menu = document.getElementById('admin-menu');
            menuOpen = !menuOpen;
            menu.style.display = menuOpen ? 'block' : 'none';
        };
        
        document.addEventListener('click', function(e) {
            const fab = document.getElementById('admin-fab');
            if (fab && !fab.contains(e.target) && menuOpen) {
                document.getElementById('admin-menu').style.display = 'none';
                menuOpen = false;
            }
        });
        
        async function checkAdminStatus() {
            try {
                const tg = window.Telegram?.WebApp;
                if (!tg || !tg.initData) return;
                
                const response = await fetch('/api/check-admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Telegram-Init-Data': tg.initData
                    },
                    body: JSON.stringify({})
                });
                
                const data = await response.json();
                
                if (data.is_admin) {
                    document.getElementById('admin-fab').style.display = 'block';
                }
            } catch (e) {
                console.error('Admin check failed:', e);
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', checkAdminStatus);
        } else {
            checkAdminStatus();
        }
        
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
        }
    })();
    </script>
</body>
</html>

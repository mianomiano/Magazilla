<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Magazilla</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div style="max-width:360px;margin:80px auto;padding:24px">
        <h1 style="text-align:center;margin-bottom:24px">🔐 Admin Login</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div style="padding:12px;border-radius:8px;margin-bottom:16px;background:{% if category == 'error' %}#e74c3c22;color:#e74c3c{% else %}#2ecc7122;color:#2ecc71{% endif %}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST" action="/admin/login">
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter admin password" autofocus required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Login</button>
        </form>
    </div>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>

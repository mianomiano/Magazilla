{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if post else 'New' }} Post{% endblock %}

{% block content %}
<div class="admin-header">
    <h1>{{ '✏️ Edit' if post else '➕ New' }} Post</h1>
    <a href="/admin/posts" class="btn btn-secondary">← Back</a>
</div>

<form method="POST" enctype="multipart/form-data" style="max-width:600px">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label>Title *</label>
        <input type="text" name="title" value="{{ post.title if post else '' }}" required>
    </div>

    <div class="form-group">
        <label>Content (HTML allowed)</label>
        <textarea name="content" style="min-height:200px">{{ post.content if post else '' }}</textarea>
    </div>

    <div class="form-group">
        <label>Gallery Images (multiple)</label>
        {% if post and images %}
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">
            {% for img in images %}
            <img src="{{ img.image_url }}" style="width:80px;height:80px;border-radius:8px;object-fit:cover">
            {% endfor %}
        </div>
        {% endif %}
        <input type="file" name="gallery" accept="image/*,.webm" multiple>
    </div>

    <div class="form-group">
        <div class="form-check">
            <input type="checkbox" name="is_published" id="isPublished" value="1" {% if post and post.is_published %}checked{% endif %}>
            <label for="isPublished">Published</label>
        </div>
    </div>

    <button type="submit" class="btn btn-primary btn-lg">💾 Save Post</button>
</form>
{% endblock %}

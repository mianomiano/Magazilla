```html id="fixedanim"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4 Items Glass Banner</title>

<style>
/* CUSTOM FONT */
@font-face {
  font-family: 'Desolator';
  src: url('../static/fonts/Desolator-Bold.otf') format('opentype');
  font-weight: bold;
  font-style: normal;
}

/* RESET */
html, body {
  margin: 0;
  padding: 0;
}

/* BANNER */
.banner {
  width: 100%;
  height: 26vw;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(160deg, #0093E9 0%, #80D0C7 100%);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 40px;
}

/* GLASS CARD */
.glassBox {
  width: 260px;
  height: 360px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.2);
  border-right-color: rgba(255,255,255,0.1);
  border-bottom-color: rgba(255,255,255,0.1);
  box-shadow: 0 20px 30px rgba(0,0,0,0.15);
  padding: 15px;
  position: relative;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* IMAGE BOX (FIXED) */
.glassBox__imgBox {
  transform: translateY(0);
  transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.glassBox__imgBox img {
  width: 100%;
  transform: translate(0,0) rotate(0deg) scale(1);
  transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

/* TITLE (FIXED) */
.glassBox__title {
  margin-top: 12px;
  color: #fff;
  font-size: 18px;
  text-align: center;
  font-family: 'Desolator', sans-serif;
  letter-spacing: 1px;

  transform: translateY(0);
  transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

/* CONTENT (FIXED SMOOTH REVEAL) */
.glassBox__content {
  position: absolute;
  left: 15px;
  right: 15px;
  bottom: 15px;

  color: #fff;
  font-size: 13px;
  text-align: center;
  letter-spacing: 0.08em;

  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

/* HOVER (FIXED) */
.glassBox:hover .glassBox__imgBox {
  transform: translateY(-50px);
}

.glassBox:hover .glassBox__imgBox img {
  transform: translate(-20px, -40px) rotate(-25deg) scale(1.4);
}

.glassBox:hover .glassBox__title {
  transform: translateY(-10px);
}

.glassBox:hover .glassBox__content {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<div class="banner">
  <div class="grid">

    <div class="glassBox">
      <div class="glassBox__imgBox">
        <img src="../static/images/w.png">
        <div class="glassBox__title">Item 1</div>
      </div>
      <div class="glassBox__content"></div>
    </div>

    <div class="glassBox">
      <div class="glassBox__imgBox">
        <img src="../static/images/p.png">
        <div class="glassBox__title">Item 2</div>
      </div>
      <div class="glassBox__content"></div>
    </div>

    <div class="glassBox">
      <div class="glassBox__imgBox">
        <img src="../static/images/g.png">
        <div class="glassBox__title">Item 3</div>
      </div>
      <div class="glassBox__content"></div>
    </div>

    <div class="glassBox">
      <div class="glassBox__imgBox">
        <img src="../static/images/s.png">
        <div class="glassBox__title">Item 4</div>
      </div>
      <div class="glassBox__content"></div>
    </div>

  </div>
</div>

</body>
</html>
